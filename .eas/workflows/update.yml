name: Update

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "*"

jobs:
  preview:
    if: github.event_name == 'pull_request'
    type: update
    params:
      branch: preview

  production:
    if: github.ref == 'refs/heads/master'
    type: update
    params:
      branch: production